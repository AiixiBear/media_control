name: Build and distribute

on:
  workflow_dispatch:
    inputs:
      version:
        description: '請輸入這次要發佈的版本號 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Create Verified Release via GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "$VERSION" build/app/outputs/flutter-apk/app-*.apk \
            --title "$VERSION" \
            --notes "此版本由 GitHub Actions 生成。"
