name: Build and distribute

on:
  workflow_dispatch: # 👈 變成完全手動，你沒點按鈕，它絕對不會自己跑
    inputs:
      version:
        description: '請輸入這次要發佈的版本號 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 👈 讓 GitHub 幫你蓋上 Verified 章的關鍵權限
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Create Verified Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "自我測試版 ${{ github.event.inputs.version }}"
          body: "此版本由 GitHub Actions 安全編譯生成。"
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/app-*.apk
